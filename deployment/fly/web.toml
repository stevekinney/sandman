app = "sandman"
primary_region = "dfw"

[build]
  dockerfile = "../containers/web.Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  SANDMAN_MAX_ACTIVE_SANDBOXES = "20"
  SANDMAN_MAX_ACTIVE_SANDBOXES_PER_SESSION = "1"
  SANDMAN_SESSION_CREATIONS_PER_TOKEN_PER_HOUR = "5"
  SANDMAN_SESSION_TTL_MS = "300000"

[deploy]
  strategy = "rolling"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
